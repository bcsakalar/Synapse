services:
  postgres:
    image: postgres:17-alpine
    container_name: synapse_postgres
    restart: unless-stopped
    ports:
      - "5488:5432"
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    volumes:
      - synapse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: synapse_redis
    restart: unless-stopped
    ports:
      - "6399:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - synapse_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: synapse_web
    restart: unless-stopped
    ports:
      - "3099:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://synapse:synapse@postgres:5432/synapse
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    env_file:
      - ../.env

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: synapse_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://synapse:synapse@postgres:5432/synapse
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    env_file:
      - ../.env

volumes:
  synapse_pgdata:
    driver: local
  synapse_redisdata:
    driver: local
